<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Client Portal</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body {
      margin: 0;
      font-family: sans-serif;
      background-color: #121212;
      color: #fff;
      padding: 20px;
    }
    select, input, textarea, button {
      font-family: inherit;
      border-radius: 4px;
      border: 1px solid #444;
      background-color: #1e1e1e;
      color: #eee;
      padding: 6px;
      margin: 4px 0;
    }
    h1, h2, h3 {
      margin: 0;
      text-align: center;
    }
    .row {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      margin-top: 20px;
    }
    .col {
      flex: 1;
      min-width: 300px;
    }
    .buttons {
      display: flex;
      gap: 10px;
      margin-bottom: 10px;
    }
    .hidden {
      display: none;
    }
    .entry {
      background: #1e1e1e;
      padding: 10px;
      margin-bottom: 10px;
      border-radius: 6px;
    }
    .entry .controls {
      float: right;
    }
    .entry textarea {
      width: 100%;
      resize: vertical;
    }
  </style>
</head>
<body>

  <div>
    <label for="clientSelect">Select Client:</label>
    <select id="clientSelect"></select>
  </div>

  <div id="clientInfo" style="text-align:center; margin-top:20px;">
    <h1 id="clientTitle">(loading...)</h1>
    <div id="clientPhone"></div>
    <div id="clientEmail"></div>
    <div id="clientAddress" style="margin-top: 5px;"></div>
  </div>

  <div class="row">
    <!-- Left column: Notes + Links -->
    <div class="col">
      <label>Notes</label>
      <textarea id="notes" rows="8" placeholder="Write notes about this client..."></textarea>

      <h3>Links</h3>
      <div id="links"></div>
    </div>

    <!-- Right column: Buttons, inputs, tasks -->
    <div class="col">
      <div class="buttons">
        <button onclick="toggleInput('link')">Add Link</button>
        <button onclick="toggleInput('business')">Add Business</button>
        <button onclick="toggleInput('task')">Add Task</button>
      </div>

      <div id="linkInput" class="hidden">
        <input type="text" id="linkLabel" placeholder="Link label">
        <input type="text" id="linkUrl" placeholder="https://example.com">
        <button onclick="addLink()">Save Link</button>
      </div>

      <div id="businessInput" class="hidden">
        <input type="text" id="bizName" placeholder="Business name">
        <textarea id="bizNote" placeholder="Business notes..."></textarea>
        <button onclick="addBusiness()">Save Business</button>
      </div>

      <div id="taskInput" class="hidden">
        <input type="text" id="taskText" placeholder="Task description">
        <button onclick="addTask()">Save Task</button>
      </div>

      <h3>Tasks</h3>
      <div id="tasks"></div>

      <h3>Businesses</h3>
      <div id="businesses"></div>
    </div>
  </div>

<script>
const BASE_URL = "https://script.google.com/macros/s/AKfycbyxUXJourLcFgUPMyBfSNfG70RGsKogz_YV3GRfx6d_u2rLsBvAWYPxCSkNqx91HbIV/exec";
let currentClient = null;
let dataStore = { links: [], businesses: [], todos: [], notes: "" };

function toggleInput(type) {
  ['link', 'business', 'task'].forEach(t => {
    document.getElementById(t + 'Input').classList.add('hidden');
  });
  document.getElementById(type + 'Input').classList.toggle('hidden');
}

function populateClientDropdown(clients) {
  const select = document.getElementById('clientSelect');
  clients.forEach(c => {
    const option = document.createElement('option');
    option.value = c.clientId;
    option.textContent = `${c.clientId} – ${c.name}`;
    select.appendChild(option);
  });
  select.addEventListener('change', () => {
    loadClient(select.value);
  });
}

function loadClient(clientId) {
  fetch(`${BASE_URL}?clientId=${clientId}`)
    .then(res => res.json())
    .then(data => {
      currentClient = clientId;
      document.getElementById("clientTitle").textContent = data.title || "(untitled)";
      document.getElementById("clientPhone").textContent = data.phone || "";
      document.getElementById("clientEmail").textContent = data.email || "";
      document.getElementById("clientAddress").textContent = data.address || "";

      dataStore = {
        links: data.links || [],
        businesses: data.businesses || [],
        todos: data.todos || [],
        notes: data.notes || ""
      };

      document.getElementById("notes").value = dataStore.notes;
      render();
    });
}

function render() {
  const linkList = document.getElementById("links");
  linkList.innerHTML = "";
  dataStore.links.forEach((link, i) => {
    const div = document.createElement("div");
    div.className = "entry";
    div.innerHTML = `
      <strong><a href="${link.url}" target="_blank">${link.label}</a></strong>
      <div class="controls">
        <button onclick="editLink(${i})">✎</button>
        <button onclick="deleteItem('links', ${i})">✕</button>
      </div>
    `;
    linkList.appendChild(div);
  });

  const taskList = document.getElementById("tasks");
  taskList.innerHTML = "";
  dataStore.todos.forEach((task, i) => {
    const div = document.createElement("div");
    div.className = "entry";
    div.innerHTML = `
      <input type="checkbox" /> ${task}
      <div class="controls">
        <button onclick="editTask(${i})">✎</button>
        <button onclick="deleteItem('todos', ${i})">✕</button>
      </div>
    `;
    taskList.appendChild(div);
  });

  const bizList = document.getElementById("businesses");
  bizList.innerHTML = "";
  dataStore.businesses.forEach((biz, i) => {
    const div = document.createElement("div");
    div.className = "entry";
    div.innerHTML = `
      <strong>${biz.name}</strong>
      <div class="controls">
        <button onclick="editBusiness(${i})">✎</button>
        <button onclick="deleteItem('businesses', ${i})">✕</button>
      </div>
      <div><textarea rows="3" onchange="updateBizNote(${i}, this.value)">${biz.note || ""}</textarea></div>
    `;
    bizList.appendChild(div);
  });

  saveToSheets();
}

function updateBizNote(index, note) {
  dataStore.businesses[index].note = note;
  saveToSheets();
}

function addLink() {
  const label = document.getElementById("linkLabel").value;
  const url = document.getElementById("linkUrl").value;
  if (label && url) {
    dataStore.links.push({ label, url });
    document.getElementById("linkLabel").value = "";
    document.getElementById("linkUrl").value = "";
    toggleInput('link');
    render();
  }
}

function addTask() {
  const text = document.getElementById("taskText").value;
  if (text) {
    dataStore.todos.push(text);
    document.getElementById("taskText").value = "";
    toggleInput('task');
    render();
  }
}

function addBusiness() {
  const name = document.getElementById("bizName").value;
  const note = document.getElementById("bizNote").value;
  if (name) {
    dataStore.businesses.push({ name, note });
    document.getElementById("bizName").value = "";
    document.getElementById("bizNote").value = "";
    toggleInput('business');
    render();
  }
}

function deleteItem(type, index) {
  dataStore[type].splice(index, 1);
  render();
}

function saveToSheets() {
  fetch(BASE_URL, {
    method: "POST",
    body: JSON.stringify({
      clientId: currentClient,
      notes: document.getElementById("notes").value,
      links: dataStore.links,
      todos: dataStore.todos,
      businesses: dataStore.businesses
    }),
    headers: { "Content-Type": "application/json" }
  }).then(r => r.json())
    .then(data => console.log("✅ Saved:", data));
}

document.getElementById("notes").addEventListener("input", () => {
  dataStore.notes = document.getElementById("notes").value;
  saveToSheets();
});

// Initial client load
fetch(`${BASE_URL}?action=listClients`)
  .then(res => res.json())
  .then(data => {
    populateClientDropdown(data.records);
    if (data.records.length > 0) {
      loadClient(data.records[0].clientId);
    }
  });
</script>

</body>
</html>
