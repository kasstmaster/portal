<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Client Portal</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1>Kassandra Raudman</h1>
    <p>Freelance Video Editor & Content Manager</p>
    <h2>Enter your password to access your portal</h2>
    <input type="password" id="password" placeholder="Enter password" />
    <button onclick="checkPassword()">Enter</button>
    <p id="error"></p>
  </div>

  <script>
    const redirectMap = {
      "7295637": "1001.html",
      "4966182": "1002.html",
      "9277154": "1003.html",
      "0284656": "1004.html",
      "5572910": "1005.html"
    };

    function checkPassword() {
      const pw = document.getElementById("password").value;
      if (redirectMap[pw]) {
        window.location.href = redirectMap[pw];
      } else {
        document.getElementById("error").textContent = "Incorrect password.";
      }
    }
  </script>
</body>
</html>
