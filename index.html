<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Client Portal</title>
  <style>
    body {
      background-color: #121212;
      color: #eee;
      font-family: sans-serif;
      margin: 0;
      padding: 20px;
    }

    select, input, textarea, button {
      background: #1e1e1e;
      color: #eee;
      border: 1px solid #444;
      border-radius: 4px;
      padding: 8px;
      margin: 5px 0;
    }

    h1 {
      text-align: center;
      font-size: 1.8em;
      margin-bottom: 0;
    }

    .sub-info {
      text-align: center;
      color: #aaa;
      margin-bottom: 20px;
    }

    .flex-container {
      display: flex;
      gap: 40px;
    }

    .left-col, .right-col {
      flex: 1;
    }

    .section {
      margin-bottom: 30px;
    }

    .button-row {
      display: flex;
      gap: 10px;
      margin-bottom: 10px;
    }

    .input-group {
      display: none;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 10px;
    }

    .task-item, .link-item, .business-item {
      background: #1e1e1e;
      padding: 10px;
      border-radius: 6px;
      margin-bottom: 8px;
    }

    .task-item input[type="checkbox"] {
      margin-right: 10px;
    }

    .controls {
      float: right;
      display: flex;
      gap: 6px;
    }

    .business-note {
      width: 100%;
      min-height: 60px;
      margin-top: 6px;
      resize: vertical;
    }
  </style>
</head>
<body>

  <!-- Dropdown -->
  <label for="clientSelect">Select Client:</label>
  <select id="clientSelect"></select>

  <!-- Centered Info -->
  <h1 id="clientTitle">(Acct – Name)</h1>
  <div class="sub-info">
    <div id="clientPhone">Phone</div>
    <div id="clientEmail">Email</div>
    <div id="clientAddress">Address</div>
  </div>

  <!-- Layout -->
  <div class="flex-container">
    <!-- Left column: Notes and Links -->
    <div class="left-col">
      <div class="section">
        <label for="notes">Client Notes:</label>
        <textarea id="notes" rows="6"></textarea>
      </div>
      <div class="section">
        <h3>Links</h3>
        <div id="linkList"></div>
      </div>
    </div>

    <!-- Right column: Inputs + Tasks -->
    <div class="right-col">
      <div class="section">
        <div class="button-row">
          <button onclick="toggleInput('link')">Add Link</button>
          <button onclick="toggleInput('business')">Add Business</button>
          <button onclick="toggleInput('task')">Add Task</button>
        </div>

        <div id="linkInput" class="input-group">
          <input type="text" id="linkLabel" placeholder="Label">
          <input type="text" id="linkURL" placeholder="https://example.com">
          <button onclick="addLink()">Add Link</button>
        </div>

        <div id="businessInput" class="input-group">
          <input type="text" id="businessName" placeholder="Business Name">
          <textarea id="businessNote" placeholder="Business Notes..."></textarea>
          <button onclick="addBusiness()">Add Business</button>
        </div>

        <div id="taskInput" class="input-group">
          <input type="text" id="taskText" placeholder="New Task">
          <button onclick="addTask()">Add Task</button>
        </div>
      </div>

      <div class="section">
        <h3>Tasks</h3>
        <div id="taskList"></div>
      </div>
    </div>
  </div>

<script>
  let links = [], tasks = [], businesses = [];

  function toggleInput(type) {
    ['link', 'business', 'task'].forEach(t => {
      document.getElementById(t + 'Input').style.display = (t === type) ? 'flex' : 'none';
    });
  }

  function addLink() {
    const label = document.getElementById('linkLabel').value;
    const url = document.getElementById('linkURL').value;
    if (!label || !url) return;
    links.push({ label, url });
    drawLinks();
    document.getElementById('linkLabel').value = '';
    document.getElementById('linkURL').value = '';
    toggleInput(null);
  }

  function drawLinks() {
    const container = document.getElementById('linkList');
    container.innerHTML = '';
    links.forEach((link, index) => {
      const div = document.createElement('div');
      div.className = 'link-item';
      div.innerHTML = `
        <a href="${link.url}" target="_blank">${link.label}</a>
        <div class="controls">
          <button onclick="editLink(${index})">✎</button>
          <button onclick="deleteLink(${index})">✕</button>
        </div>
      `;
      container.appendChild(div);
    });
  }

  function deleteLink(index) {
    links.splice(index, 1);
    drawLinks();
  }

  function editLink(index) {
    const newLabel = prompt("New label:", links[index].label);
    const newURL = prompt("New URL:", links[index].url);
    if (newLabel && newURL) {
      links[index] = { label: newLabel, url: newURL };
      drawLinks();
    }
  }

  function addTask() {
    const text = document.getElementById('taskText').value;
    if (!text) return;
    tasks.push({ text, done: false });
    drawTasks();
    document.getElementById('taskText').value = '';
    toggleInput(null);
  }

  function drawTasks() {
    const container = document.getElementById('taskList');
    container.innerHTML = '';
    tasks.forEach((task, index) => {
      const div = document.createElement('div');
      div.className = 'task-item';
      div.innerHTML = `
        <input type="checkbox" ${task.done ? 'checked' : ''} onchange="toggleTask(${index})">
        <span>${task.text}</span>
        <div class="controls">
          <button onclick="editTask(${index})">✎</button>
          <button onclick="deleteTask(${index})">✕</button>
        </div>
      `;
      container.appendChild(div);
    });
  }

  function toggleTask(index) {
    tasks[index].done = !tasks[index].done;
    drawTasks();
  }

  function editTask(index) {
    const newText = prompt("Edit task:", tasks[index].text);
    if (newText) {
      tasks[index].text = newText;
      drawTasks();
    }
  }

  function deleteTask(index) {
    tasks.splice(index, 1);
    drawTasks();
  }

  function addBusiness() {
    const name = document.getElementById('businessName').value;
    const note = document.getElementById('businessNote').value;
    if (!name) return;
    businesses.push({ name, note });
    drawBusinesses();
    document.getElementById('businessName').value = '';
    document.getElementById('businessNote').value = '';
    toggleInput(null);
  }

  function drawBusinesses() {
    const container = document.querySelector(".right-col");
    const existing = document.getElementById("bizList");
    if (existing) existing.remove();

    const section = document.createElement("div");
    section.id = "bizList";
    section.innerHTML = "<h3>Businesses</h3>";

    businesses.forEach((biz, index) => {
      const div = document.createElement("div");
      div.className = "business-item";
      div.innerHTML = `
        <div style="display:flex; justify-content:space-between;">
          <strong>${biz.name}</strong>
          <div class="controls">
            <button onclick="editBusiness(${index})">✎</button>
            <button onclick="deleteBusiness(${index})">✕</button>
          </div>
        </div>
        <textarea class="business-note" onchange="updateBusinessNote(${index}, this.value)">${biz.note}</textarea>
      `;
      section.appendChild(div);
    });

    container.appendChild(section);
  }

  function editBusiness(index) {
    const newName = prompt("Business name:", businesses[index].name);
    if (newName) {
      businesses[index].name = newName;
      drawBusinesses();
    }
  }

  function updateBusinessNote(index, val) {
    businesses[index].note = val;
  }

  function deleteBusiness(index) {
    businesses.splice(index, 1);
    drawBusinesses();
  }

  // Later: Load/save from Google Sheets via fetch()
</script>

</body>
</html>
